syntax = "proto3";

package hello;

option go_package = "github.com/jrussellsmyth/GoGrpc/api/proto/hello";

// The Hello service definition
service HelloService {
  // Sends a greeting
  rpc SayHello (HelloRequest) returns (HelloResponse) {}
  // Streams random words
  rpc StreamRandomWords (StreamRandomWordsRequest) returns (stream StreamRandomWordsResponse) {}
}

// The request message containing the user's name
message HelloRequest {
  string name = 1;
}

// The response message containing the greetings
message HelloResponse {
  string message = 1;
}

// The request message for streaming random words
message StreamRandomWordsRequest {
  int32 num_words = 1;
}

// The response message for streaming random words
message StreamRandomWordsResponse {
  string word = 1;
}